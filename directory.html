<!DOCTYPE html>
<html>
<head>


<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Manrope:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap');
    body { margin: 0; background: #050505; }
    ::selection { background: #baff2c; color: #050505; }
  </style>
</helmet>

<div style="width:100%; max-width:480px; margin:0 auto; background:#050505; color:#efece4; font-family:'Manrope',sans-serif; min-height:100vh; box-sizing:border-box;">

  <!-- NAV -->
  <div style="display:flex; align-items:center; justify-content:space-between; padding:22px;">
    <a href="index.html" style="font-family:'JetBrains Mono',monospace; font-size:13px; letter-spacing:0.14em; color:#efece4; text-decoration:none;">I.K.</a>
    <a href="index.html" style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.14em; color:#8f8c85; text-decoration:none;">← BACK</a>
  </div>

  <!-- HEADER -->
  <div style="padding:12px 28px 48px;">
    <div style="font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:0.18em; color:#6b6b66; margin-bottom:16px;">INDEX</div>
    <div style="font-family:'Instrument Serif',serif; font-style:italic; font-size:34px; color:#efece4; line-height:1.2;">
      Everything, in order.
    </div>
  </div>

  <!-- DIRECTORY -->
  <div style="padding:0 28px 64px;">
    <sc-for list="{{ entries }}" as="e" hint-placeholder-count="4">
      <a href="{{ e.href }}" style="display:flex; align-items:baseline; justify-content:space-between; gap:16px; padding:22px 0; border-top:1px solid rgba(239,236,228,0.1); text-decoration:none;">
        <div style="display:flex; align-items:baseline; gap:16px;">
          <div style="font-family:'JetBrains Mono',monospace; font-size:12px; color:#baff2c;">{{ e.n }}</div>
          <div style="font-family:'Instrument Serif',serif; font-style:italic; font-size:24px; color:#efece4;">{{ e.title }}</div>
        </div>
        <div style="font-family:'JetBrains Mono',monospace; font-size:11px; color:#6b6b66;">→</div>
      </a>
    </sc-for>
    <div style="border-top:1px solid rgba(239,236,228,0.1);"></div>
  </div>

  <!-- FOOTER -->
  <div style="padding:32px 28px 40px; border-top:1px solid rgba(239,236,228,0.08); display:flex; justify-content:space-between; align-items:center;">
    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.12em; color:#5c5a54;">© {{ year }} I.K.</div>
    <div style="font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:0.12em; color:#5c5a54;">INVITE ONLY</div>
  </div>

</div>

</x-dc>
<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  renderVals() {
    return {
      year: new Date().getFullYear(),
      entries: [
        { n: '01', title: 'The Premise', href: 'index.html' },
        { n: '02', title: 'The Circle', href: 'circle.html' },
        { n: '03', title: 'Access', href: 'access.html' },
        { n: '04', title: 'Shop', href: 'shop.html' },
        { n: '05', title: 'Contact', href: 'contact.html' },
      ],
    };
  }
}

</script>
</body>
</html>
